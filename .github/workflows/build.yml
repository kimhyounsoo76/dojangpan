name: APK build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Rename
        run: |
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk out/bokseup-dojangpan.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bokseup-dojangpan-apk
          path: out/bokseup-dojangpan.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: 복습 도장판 (최신)
          body: bokseup-dojangpan.apk 를 폰에서 눌러 설치하세요.
          files: out/bokseup-dojangpan.apk
