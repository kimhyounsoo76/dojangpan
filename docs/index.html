<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>복습 도장판 — 웹 미리보기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family:'Archivo'; src:url('fonts/archivo-700.woff2') format('woff2');
    font-weight:700; font-style:normal; font-display:swap;
  }

  :root{
    --paper:#E7EBF1;
    --card:#FFFFFF;
    --ink:#14172A;
    --ink-2:#5A6178;
    --ink-3:#99A0B2;
    --line:#D5DBE5;
    --hair:#EDF0F5;
    /* 네 색은 장식이 아니라 네 간격이다 */
    --new:#2E3A5C;
    --d1:#0B6E78;
    --d7:#9A5B00;
    --d30:#6E3691;
    --seal:#C0362C;
    --sans:-apple-system,BlinkMacSystemFont,'Noto Sans KR','Malgun Gothic',sans-serif;
    --num:'Archivo',ui-monospace,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5}
  .wrap{max-width:640px;margin:0 auto;padding:16px 12px 40px}

  /* ── 머리 ── */
  .top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .brand{font-size:15px;font-weight:800;letter-spacing:-.02em}
  #webTag{font-size:9px;font-weight:800;letter-spacing:.06em;color:var(--ink-3);
    border:1px solid var(--line);border-radius:5px;padding:2px 5px;vertical-align:2px;margin-left:2px}
  .brand em{font-style:normal;color:var(--ink-3);font-weight:600;font-family:var(--num);font-size:11px;
    letter-spacing:.1em;margin-left:7px}
  .tools{display:flex;gap:6px}
  .btn{font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink-2);background:var(--card);
    border:1px solid var(--line);border-radius:9px;padding:8px 12px;cursor:pointer;white-space:nowrap}
  .btn:active{background:var(--hair)}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .btn.danger{color:var(--seal)}

  /* ── 날짜 줄 ── */
  .datebar{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:10px 10px 10px 14px;margin-bottom:10px}
  .dwhen{flex:1;min-width:0}
  .dwhen b{display:block;font-size:14px;font-weight:700;letter-spacing:-.01em}
  .dwhen span{font-family:var(--num);font-weight:500;font-size:11px;color:var(--ink-3);letter-spacing:.04em}
  .dexam{font-family:var(--num);font-weight:700;font-size:15px;letter-spacing:-.02em;color:var(--seal);
    padding-right:4px;white-space:nowrap}
  .dexam small{display:block;font-family:var(--sans);font-size:9px;font-weight:600;color:var(--ink-3);
    letter-spacing:.08em;text-align:right}
  .nav{display:flex;gap:4px}
  .nav{display:flex;gap:4px;flex:none}
  .navbtn{width:32px;height:32px;border:1px solid var(--line);background:var(--card);border-radius:8px;
    color:var(--ink-2);font-size:11px;line-height:1;flex:none;padding:0}
  .navbtn:disabled{opacity:.28}

  /* ── 밀림 띠 ── */
  .shift{display:flex;align-items:center;gap:10px;background:#FCEEEC;border:1px solid #F0CFCB;
    border-radius:12px;padding:11px 12px;margin-bottom:10px}
  .shift p{margin:0;flex:1;font-size:12.5px;color:#8A2A22;line-height:1.4}
  .shift b{font-weight:800}
  .shift .btn{font-size:12px;padding:7px 10px;border-color:#E4BDB8;color:#8A2A22}

  /* ── 오늘 할 일 ── */
  .today{margin-bottom:10px}
  .todo{display:flex;align-items:stretch;gap:0;background:var(--card);border:1px solid var(--line);
    border-radius:12px;margin-bottom:8px;overflow:hidden;position:relative}
  .todo .spine{width:5px;flex:none;background:var(--c)}
  .todo .meat{flex:1;min-width:0;padding:12px 4px 12px 13px}
  .todo .kind{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:800;color:var(--c);
    letter-spacing:.02em;margin-bottom:2px}
  .todo .odd{font-family:var(--num);font-weight:700;font-size:9px;letter-spacing:.06em;color:#fff;
    background:var(--seal);border-radius:4px;padding:2px 5px}
  .todo .n{font-family:var(--num);font-weight:700;font-size:30px;letter-spacing:-.035em;line-height:1.05;
    font-variant-numeric:tabular-nums;display:block}
  .todo .n i{font-style:normal;font-size:14px;font-weight:500;color:var(--ink-3);margin-left:3px;letter-spacing:0}
  .todo .tt{font-size:12px;color:var(--ink-2);line-height:1.45;margin-top:4px}
  .todo .tt em{font-style:normal;font-family:var(--num);font-weight:500;color:var(--ink-3);margin-right:4px}
  .stamp{width:64px;flex:none;border:0;background:transparent;display:flex;align-items:center;
    justify-content:center;cursor:pointer;padding:0}
  .stamp span{width:34px;height:34px;border-radius:50%;border:2px solid var(--line);display:block;
    transition:transform .12s ease, background .12s ease, border-color .12s ease}
  .stamp:active span{transform:scale(.86)}

  .doneline{display:flex;align-items:center;gap:8px;padding:9px 13px;background:var(--card);
    border:1px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer;width:100%;
    font:inherit;text-align:left;color:var(--ink-3)}
  .doneline .dot{width:7px;height:7px;border-radius:50%;background:var(--c);flex:none}
  .doneline .lb{font-family:var(--num);font-weight:700;font-size:14px;color:var(--ink-3);
    text-decoration:line-through;text-decoration-thickness:1.5px}
  .doneline .st{font-size:11.5px;flex:1}
  .doneline .un{font-size:11px;font-weight:600;color:var(--ink-3)}

  .clear{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:22px 16px;text-align:center}
  .clear b{display:block;font-size:15px;font-weight:700;margin-bottom:5px}
  .clear p{margin:0;font-size:12.5px;color:var(--ink-3);line-height:1.5}
  .clear p em{font-style:normal;font-family:var(--num);font-weight:700;color:var(--ink-2)}

  .tip{font-size:11px;color:var(--ink-3);line-height:1.45;padding:2px 4px 0}
  .tip b{color:var(--ink-2);font-weight:700}
  .alarm{display:flex;gap:7px;font-size:11.5px;color:#8A2A22;line-height:1.45;background:#FCEEEC;
    border:1px solid #F0CFCB;border-radius:10px;padding:10px 12px;margin-top:10px}
  .alarm b{font-weight:800}

  /* ── 도장판: 칸이 아래에서부터 차오른다. 높이=진도, 색=마지막으로 끝낸 단계 ── */
  .board{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:10px}
  .bhead{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:11px}
  .bhead h2{font-size:11px;font-weight:800;color:var(--ink-3);margin:0;letter-spacing:.02em}
  .bhead .cnt{font-family:var(--num);font-weight:700;font-size:12px;color:var(--ink-2);
    font-variant-numeric:tabular-nums}
  .bhead .cnt i{font-style:normal;color:var(--ink-3);font-weight:500}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
  .cell{position:relative;height:44px;background:#F4F6FA;border:1px solid var(--line);border-radius:7px;
    padding:0;font:inherit;overflow:hidden;cursor:pointer;display:block}
  .cell .n{position:absolute;top:4px;left:0;right:0;font-family:var(--num);font-weight:500;font-size:11px;
    color:var(--ink-3);text-align:center;z-index:2;font-variant-numeric:tabular-nums;line-height:1}
  .cell .ink{position:absolute;left:0;right:0;bottom:0;height:var(--h);background:var(--c);
    transition:height .22s ease}
  .cell.full{border-color:var(--ink)}
  .cell.full .n{color:var(--ink);font-weight:700}
  .cell .hard{position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;
    background:var(--seal);z-index:3}
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:11px;padding-top:10px;border-top:1px solid var(--hair)}
  .legend i{font-style:normal;display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--ink-3)}
  .legend b{width:8px;height:8px;border-radius:2px;display:block}

  /* ── 일정표 ── */
  .list{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:10px}
  details summary{cursor:pointer;font-size:11px;font-weight:800;color:var(--ink-3);list-style:none}
  details summary::-webkit-details-marker{display:none}
  details summary::before{content:'▸ '}
  details[open] summary::before{content:'▾ '}
  details[open] summary{margin-bottom:11px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{text-align:left;padding:6px 4px;border-bottom:1px solid var(--hair)}
  th{font-size:9.5px;color:var(--ink-3);font-weight:800;letter-spacing:.04em}
  td{font-family:var(--num);font-weight:500;color:var(--ink-2);font-variant-numeric:tabular-nums}
  tr.now td{background:#F1F7F8;font-weight:700}
  tr.exam td{background:#FCEEEC;color:#8A2A22}
  .rest{color:var(--ink-3)}

  /* ── 팝업 ── */
  dialog{border:1px solid var(--line);border-radius:14px;padding:0;max-width:360px;width:calc(100% - 26px);color:var(--ink)}
  dialog::backdrop{background:rgba(20,23,42,.44)}
  .dlg{padding:18px}
  .dlg h3{font-size:17px;margin:0 0 2px;font-weight:800;letter-spacing:-.01em}
  .dlg h3 em{font-style:normal;font-family:var(--num);font-weight:700}
  .dlg p.sub{margin:0 0 14px;font-size:11.5px;color:var(--ink-3)}
  .togs{display:grid;gap:6px;margin-bottom:14px}
  .tog{display:flex;align-items:center;gap:9px;padding:11px 12px;border:1.5px solid var(--line);
    background:var(--card);border-radius:9px;font:inherit;font-size:14px;text-align:left;color:var(--ink-2);width:100%}
  .tog .tk{width:9px;height:9px;border-radius:3px;background:var(--line);flex:none}
  .tog.on{border-color:currentColor;font-weight:700}
  .tog .lbl{flex:1}
  .tog .st{font-family:var(--num);font-weight:500;font-size:11px;color:var(--ink-3)}
  .tog.on .st{color:inherit}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:5px}
  .field input,.field textarea{width:100%;padding:10px 11px;border:1px solid var(--line);border-radius:9px;
    font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--card)}
  .field input[type=date],.field input[type=time],.field input[type=number]{font-family:var(--num);font-weight:500}
  .field textarea{min-height:210px;font-size:13px;line-height:1.6;resize:vertical}
  .field .note{font-size:11px;color:var(--ink-3);margin:4px 0 0;line-height:1.45}
  .check{display:flex;align-items:center;gap:9px;margin-bottom:12px;font-size:14px;font-weight:700;color:var(--ink-2)}
  .check input{width:20px;height:20px}
  .row{display:flex;gap:7px;justify-content:flex-end;flex-wrap:wrap}
  .sep{height:1px;background:var(--line);margin:14px 0}
  .warn{background:#FCEEEC;border:1px solid #F0CFCB;border-radius:9px;padding:11px 12px;margin-bottom:10px}
  .warn p{margin:0 0 8px;font-size:12px;color:#8A2A22;line-height:1.5}
  .warn .btn{font-size:12px;padding:7px 10px}
  .rounds{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .rounds input{width:100%;padding:9px 0;border:1px solid var(--line);border-radius:9px;text-align:center;
    font-family:var(--num);font-weight:700;font-size:15px;color:var(--ink);background:var(--card)}
  .rbtn{padding:10px 0;border:1.5px solid var(--line);background:var(--card);border-radius:9px;
    font:inherit;font-size:14px;font-weight:700;color:var(--ink-2);cursor:pointer}
  .rbtn.on{border-color:currentColor}
  .prev{background:#F6F8FB;border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}
  .prow{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px}
  .prow .pd{width:5px;height:5px;border-radius:2px;flex:none}
  .prow .pn{width:34px;font-weight:800;font-size:11px}
  .prow .pw{flex:1;font-family:var(--num);font-weight:500;font-size:11px;color:var(--ink-3)}
  .prow .pl{font-family:var(--num);font-weight:700;font-size:13px;color:var(--ink)}
  .psum{margin:8px 0 0;padding-top:8px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-2);line-height:1.5}
  .psum b{font-family:var(--num);font-weight:700}
  .pbad{color:#8A2A22}
  .tnote{font-size:11px;color:var(--ink-3);margin:9px 2px 0;line-height:1.5}
  #table tr.gap td{background:#FCF3E8}
  #table tr.gap td:first-child::after{content:'쉼';margin-left:6px;font-size:9px;font-weight:800;color:#9A5B00}
  .tnote .gapmsg{color:#8A2A22;font-weight:800}
  .tnote s{text-decoration:line-through;text-decoration-thickness:1.5px;color:var(--ink-3)}
  .okline{font-size:11.5px;color:var(--ink-3);margin:0 0 10px}
  .hardbox{display:flex;align-items:center;gap:8px;background:#FCEEEC;border:1px solid #F0CFCB;
    border-radius:9px;padding:9px 11px;margin-bottom:12px}
  .hardbox p{margin:0;flex:1;font-size:11.5px;color:#8A2A22;line-height:1.4}
  .hardbox .btn{font-size:11.5px;padding:6px 9px;border-color:#E4BDB8;color:#8A2A22}

  .foot{margin-top:12px;text-align:center;font-size:10.5px;color:var(--ink-3);font-family:var(--num);font-weight:500}

  .btn:focus-visible,.navbtn:focus-visible,.stamp:focus-visible,.cell:focus-visible,
  .tog:focus-visible,.doneline:focus-visible{outline:2px solid var(--d1);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="brand">복습 도장판 <span id="webTag">웹</span><em id="brandSub">1 · 7 · 30</em></div>
    <div class="tools">
      <button class="btn" id="btnSetup">설정</button>
      <button class="btn" id="btnData">백업</button>
    </div>
  </div>

  <div class="datebar">
    <div class="dwhen">
      <b id="dDate">—</b>
      <span id="dSub"></span>
    </div>
    <div class="dexam" id="dExam"></div>
    <div class="nav">
      <span class="nav" id="nav">
        <button class="navbtn" id="prevDay" aria-label="이전 날">◀</button>
        <button class="navbtn" id="todayBtn" aria-label="오늘로">●</button>
        <button class="navbtn" id="nextDay" aria-label="다음 날">▶</button>
      </span>
    </div>
  </div>

  <div id="shift"></div>
  <div class="today" id="today"></div>
  <p class="tip" id="tip"></p>
  <div id="examWarn"></div>

  <div class="board">
    <div class="bhead">
      <h2>도장판</h2>
      <div class="cnt" id="bcnt"></div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="legend">
      <i><b style="background:var(--new)"></b>수강</i>
      <i><b style="background:var(--d1)"></b><span id="lg1">1일</span></i>
      <i><b style="background:var(--d7)"></b><span id="lg2">1주</span></i>
      <i><b style="background:var(--d30)"></b><span id="lg3">1달</span></i>
      <i><b style="background:var(--seal);border-radius:50%"></b>막힘</i>
    </div>
  </div>

  <div class="list">
    <details>
      <summary id="tblTitle">전체 일정표</summary>
      <div style="overflow-x:auto"><table id="table"></table></div>
      <p class="tnote" id="tnote"></p>
    </details>
  </div>

  <p class="foot" id="foot"></p>
</div>

<dialog id="lecDlg"><div class="dlg">
  <h3>강의 <em id="lecNo">1</em></h3>
  <p class="sub" id="lecSub"></p>
  <div class="field">
    <label for="lecName">제목</label>
    <input type="text" id="lecName" placeholder="예: 조선 후기 경제">
  </div>
  <div id="lecHard"></div>
  <div class="togs" id="lecTogs"></div>
  <div class="row"><button class="btn primary" id="lecClose">닫기</button></div>
</div></dialog>

<dialog id="setDlg"><div class="dlg">
  <h3>설정</h3>
  <p class="sub">바꿔도 체크한 기록은 남습니다</p>
  <div class="row" style="justify-content:flex-start;margin-bottom:12px">
    <button class="btn primary" id="btnPlan">복습 계획 세우기</button>
  </div>
  <p class="note" id="planNow" style="margin:-6px 0 12px"></p>

  <div class="field" id="wStartRow">
    <label for="fStart">1일차 날짜</label>
    <input type="date" id="fStart">
  </div>
  <div class="field">
    <label for="fTotal">전체 강의 수</label>
    <input type="number" id="fTotal" min="1" max="500" inputmode="numeric">
  </div>
  <div class="field" id="wPer">
    <label for="fPer">하루에 듣는 강의 수</label>
    <input type="number" id="fPer" min="1" max="20" inputmode="numeric">
    <p class="note">이 수만큼 묶어서 한 덩어리로 복습합니다.</p>
  </div>
  <div class="field" id="wExamRow">
    <label for="fExam">시험일</label>
    <input type="date" id="fExam">
  </div>
  <div class="row" style="justify-content:flex-start;margin-bottom:10px">
    <button class="btn" id="btnTitles">강의 제목 입력</button>
  </div>
  <div class="sep"></div>
  <label class="check"><input type="checkbox" id="fNotifyOn"> 매일 알림 받기</label>
  <div class="field">
    <label for="fTime">알림 시각</label>
    <input type="time" id="fTime">
  </div>
  <div id="notifyHelp"></div>
  <div class="row">
    <button class="btn" id="setCancel">취소</button>
    <button class="btn primary" id="setSave">저장</button>
  </div>
</div></dialog>

<dialog id="planDlg"><div class="dlg">
  <h3>복습 계획 세우기</h3>
  <p class="sub">이미 들은 만큼 빼고 계획을 짜 드립니다</p>
  <div class="field">
    <label>방식</label>
    <div class="togs" style="margin-bottom:0">
      <button class="tog" id="wmPhase"><span class="tk"></span><span class="lbl">단계형 — 정해진 기간 안에 N회</span></button>
      <button class="tog" id="wmInterval"><span class="tk"></span><span class="lbl">간격형 — 들은 날로부터 1일·1주·1달</span></button>
    </div>
    <p class="note" id="wmNote"></p>
  </div>
  <div class="two">
    <div class="field"><label for="wTotal">전체 강의</label><input type="number" id="wTotal" min="1" max="500" inputmode="numeric"></div>
    <div class="field" id="wHeardRow"><label for="wHeard">이미 들은 강의</label><input type="number" id="wHeard" min="0" max="500" inputmode="numeric"></div>
  </div>
  <div class="two">
    <div class="field"><label for="wStart">시작일</label><input type="date" id="wStart"></div>
    <div class="field"><label for="wExam">시험일</label><input type="date" id="wExam"></div>
  </div>
  <div class="field">
    <label for="wPerNew">하루에 들을 신규 강의</label>
    <input type="number" id="wPerNew" min="1" max="20" inputmode="numeric">
  </div>
  <div class="field" id="wRoundsRow">
    <label>복습 횟수</label>
    <div class="rounds" id="wRounds"></div>
  </div>
  <div class="field" id="wOffsRow">
    <label>복습 간격 (며칠 뒤)</label>
    <div class="rounds">
      <input type="number" id="wOff1" min="1" max="365" inputmode="numeric">
      <input type="number" id="wOff2" min="1" max="365" inputmode="numeric">
      <input type="number" id="wOff3" min="1" max="365" inputmode="numeric">
    </div>
    <p class="note">기본은 1 · 7 · 30입니다. 기간이 짧으면 줄이세요.</p>
  </div>
  <div id="wPrev"></div>
  <div class="row">
    <button class="btn" id="planCancel">취소</button>
    <button class="btn primary" id="planGo">이 계획으로 시작</button>
  </div>
</div></dialog>

<dialog id="titleDlg"><div class="dlg">
  <h3>강의 제목</h3>
  <p class="sub">한 줄에 하나씩 · 1강부터 순서대로</p>
  <div class="field">
    <textarea id="fTitles" spellcheck="false" placeholder="선사시대의 특징과 문화&#10;고조선과 부족국가&#10;삼국시대 (고구려 1)"></textarea>
    <p class="note">강의 목록을 그대로 붙여넣으세요. 빈 줄은 제목 없음입니다.</p>
  </div>
  <div class="row">
    <button class="btn" id="titleCancel">취소</button>
    <button class="btn primary" id="titleSave">저장</button>
  </div>
</div></dialog>

<dialog id="dataDlg"><div class="dlg">
  <h3>백업</h3>
  <p class="sub">폰을 바꿀 때 파일로 옮기세요</p>
  <div class="row" style="justify-content:flex-start">
    <button class="btn" id="doExport">내보내기</button>
    <button class="btn" id="doImport">가져오기</button>
  </div>
  <input type="file" id="fileIn" accept="application/json" hidden>
  <div class="sep"></div>
  <div class="row" style="justify-content:space-between">
    <button class="btn danger" id="doReset">전부 지우고 처음부터</button>
    <button class="btn primary" id="dataClose">닫기</button>
  </div>
</div></dialog>

<script>
(function(){
  'use strict';

  var N = (typeof window.Android !== 'undefined') ? window.Android : null;

  var STAGE_KEYS = ['d1','d7','d30'];
  var STAGE_COLS = ['var(--d1)','var(--d7)','var(--d30)'];
  var DEFAULT_OFFS = [1,7,30];
  function offLabel(n){
    return n===1?'1일' : n===7?'1주' : n===14?'2주' : n===21?'3주'
         : n===30?'1달' : n===60?'2달' : n===90?'3달' : n+'일';
  }
  /** 간격은 계획마다 다를 수 있다 (기본 1·7·30) */
  function STAGES_(){
    var offs=(state.offs && state.offs.length) ? state.offs : DEFAULT_OFFS;
    var out=[{k:'new', label:'신규', short:'수강', offset:0, color:'var(--new)'}];
    for(var i=0;i<3;i++){
      var o=offs[i]!=null?offs[i]:DEFAULT_OFFS[i];
      if(o<=0) continue;
      out.push({k:STAGE_KEYS[i], label:offLabel(o), short:offLabel(o)+' 복습', offset:o, color:STAGE_COLS[i]});
    }
    return out;
  }
  var ROUND_COLORS = ['var(--d1)','var(--d7)','var(--d30)','var(--p4)'];
  function PH(){
    var out=[{k:'new', name:'수강', color:'var(--new)'}];
    var r=(state.rounds||[]).length || 3;
    for(var i=1;i<=r;i++) out.push({k:'p'+i, name:i+'차', color:ROUND_COLORS[i-1]});
    return out;
  }
  var REDO_GAP = 3;
  var KEY = 'bokseup-dojangpan-web-v1';
  var DAYS = ['일','월','화','수','목','금','토'];

  function pad(n){ return (n<10?'0':'')+n; }
  function todayISO(){ var n=new Date(); return n.getFullYear()+'-'+pad(n.getMonth()+1)+'-'+pad(n.getDate()); }
  function fmtISO(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function parseISO(s){ var p=String(s).split('-'); return new Date(+p[0], +p[1]-1, +p[2]); }
  function addDays(d,n){ var x=new Date(d.getTime()); x.setDate(x.getDate()+n); return x; }
  function human(d){ return (d.getMonth()+1)+'월 '+d.getDate()+'일 '+DAYS[d.getDay()]+'요일'; }
  function diffDays(a,b){ return Math.round((b-a)/86400000); }
  function stageByKey(k){ var _S=STAGES_(); for(var i=0; i<_S.length;i++) if(STAGES_()[i].k===k) return STAGES_()[i]; return null; }
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  function defaults(){
    return {mode:'interval',
            start:todayISO(), total:60, per:3, done:{}, titles:{}, redo:{}, exam:'',
            newTo:'', rounds:[], perNew:2, hard:{}, plan:null, offs:[1,7,30],
            notifyOn:true, notifyHour:21, notifyMin:0};
  }
  function isPhase(){ return state.mode==='phase'; }
  var state = defaults();
  var view = 1;

  function save(){
    var s = JSON.stringify(state);
    if(N){ try{ N.setState(s); }catch(e){} }
    else { try{ localStorage.setItem(KEY, s); }catch(e){} }
  }
  function load(){
    var raw=null;
    if(N){ try{ raw = N.getState(); }catch(e){} }
    else { try{ raw = localStorage.getItem(KEY); }catch(e){} }
    if(!raw) return;
    try{
      var o = JSON.parse(raw);
      if(o && o.start && o.total){
        state = Object.assign(defaults(), o);
        state.done=o.done||{}; state.titles=o.titles||{}; state.redo=o.redo||{}; state.exam=o.exam||'';
        state.hard=o.hard||{}; state.plan=o.plan||null; state.mode=o.mode||'interval';
        state.rounds=o.rounds||[]; state.perNew=o.perNew||2;
        state.offs=(o.offs && o.offs.length===3)?o.offs:[1,7,30];
      }
    }catch(e){}
  }
  window.__reload = function(){ load(); view = clampToday(); render(); };

  /* ── 스케줄 ── */
  function blockCount(){ return Math.ceil(state.total/state.per); }
  function lecturesOf(b){
    var a=[], from=(b-1)*state.per+1, to=Math.min(b*state.per, state.total);
    for(var i=from;i<=to;i++) a.push(i);
    return a;
  }
  function labelOf(b){ var L=lecturesOf(b); return L.length===1?String(L[0]):L[0]+'–'+L[L.length-1]; }
  function dayOf(b,s){ return b+s.offset; }
  /** 앞 단계가 다 끝났는데 다음 단계가 아직 안 오는 기간
   *  빈 날 = 다음간격 − 이번간격 − 덩어리수 */
  function idleGaps(total, per, offs){
    var blocks=Math.ceil(total/Math.max(1,per));
    var chain=[0].concat(offs);
    var names=['신규'].concat(offs.map(offLabel));
    var out=[];
    for(var i=0;i<chain.length-1;i++){
      var g=chain[i+1]-chain[i]-blocks;
      if(g<=0) continue;
      out.push({fromName:names[i], toName:names[i+1],
                fromDay:blocks+chain[i]+1, toDay:chain[i+1],
                days:g, fix:chain[i]+blocks});
    }
    return out;
  }

  function maxOff(){
    var st=STAGES_(), m=0;
    st.forEach(function(x){ if(x.offset>m) m=x.offset; });
    return m;
  }
  function lastDay(){ return blockCount()+maxOff(); }
  function isDone(n,k){ return !!state.done[n+':'+k]; }
  function blockDone(b,k){ return lecturesOf(b).every(function(n){ return isDone(n,k); }); }
  function titleOf(n){ return state.titles[String(n)]||''; }
  function setBlockRaw(b,k,v){
    lecturesOf(b).forEach(function(n){ if(v) state.done[n+':'+k]=true; else delete state.done[n+':'+k]; });
  }
  function setBlock(b,k,v){ setBlockRaw(b,k,v); save(); render(); }
  function scheduled(day,s){ var b=day-s.offset; return (b>=1 && b<=blockCount())?b:null; }
  function overdue(day,s){
    var out=[];
    for(var b=1;b<=blockCount();b++){
      var d=dayOf(b,s);
      if(d<day && !blockDone(b,s.k)) out.push({b:b, day:d});
    }
    return out;
  }
  function redoDue(day){
    var out=[];
    for(var k in state.redo) if(state.redo[k]<=day) out.push({key:k, due:state.redo[k]});
    out.sort(function(a,b){ return a.due-b.due; });
    return out;
  }
  function markHard(b,k,day){
    setBlockRaw(b,k,true);
    state.redo[b+':'+k] = day + REDO_GAP;
    save(); render();
  }
  function hardOfLec(n){
    var out=[];
    for(var k in state.redo){
      var b=parseInt(k.split(':')[0],10);
      if(lecturesOf(b).indexOf(n)>=0) out.push(k);
    }
    return out;
  }
  function progressOf(n){ var c=0; STAGES_().forEach(function(s){ if(isDone(n,s.k)) c++; }); return c; }
  function lastStageOf(n){
    var last=null;
    STAGES_().forEach(function(s){ if(isDone(n,s.k)) last=s; });
    return last;
  }
  function clampToday(){
    var d = diffDays(parseISO(state.start), parseISO(todayISO()))+1;
    return Math.max(1, Math.min(lastDay(), d));
  }
  function behindDays(day){
    var oldest=null;
    STAGES_().forEach(function(s){
      overdue(day,s).forEach(function(o){ if(oldest===null||o.day<oldest) oldest=o.day; });
    });
    redoDue(day).forEach(function(r){ if(r.due<day && (oldest===null||r.due<oldest)) oldest=r.due; });
    return oldest===null ? 0 : day-oldest;
  }
  function examDayIndex(){ return state.exam ? diffDays(parseISO(state.start), parseISO(state.exam))+1 : null; }
  function examDDay(){ return state.exam ? diffDays(parseISO(todayISO()), parseISO(state.exam)) : null; }
  function examProblem(){
    var e=examDayIndex();
    if(e===null) return null;
    if(e<blockCount()){
      // 이미 들은 덩어리는 경고 대상이 아니다
      for(var b0=Math.max(1,e); b0<=blockCount(); b0++){
        if(!blockDone(b0,'new')) return {kind:'수강', from:(b0-1)*state.per+1};
      }
    }
    if(e<lastDay()){
      var m=maxOff();
      for(var b=1;b<=blockCount();b++) if(b+m>e) return {kind:offLabel(m), from:(b-1)*state.per+1};
    }
    return null;
  }

  /* ── 단계형 ── */
  function phTo(k){
    if(k==='new') return state.newTo;
    var i=parseInt(k.substring(1),10);
    var r=(state.rounds||[])[i-1];
    return r ? r.to : '';
  }
  function phFrom(k){
    if(k==='new'||k==='p1') return state.start;
    var i=parseInt(k.substring(1),10);
    var prev=phTo('p'+(i-1));
    return prev ? fmtISO(addDays(parseISO(prev), 1)) : '';
  }

  /** 계획 생성기 — 이미 들은 만큼 빼고, 남은 날을 복습 횟수로 나눈다 */
  function makePlan(o){
    var last = fmtISO(addDays(parseISO(o.exam), -1));           // 시험 전날까지 공부
    var span = diffDays(parseISO(o.start), parseISO(last)) + 1;
    if(span < 1) return null;

    var left = Math.max(0, o.total - o.heard);
    var newDays = left>0 ? Math.ceil(left / Math.max(1,o.perNew)) : 0;
    newDays = Math.min(newDays, span);
    var newTo = fmtISO(addDays(parseISO(o.start), Math.max(0, newDays-1)));

    var R = Math.max(1, Math.min(4, o.rounds));
    var w=[], sum=0;
    for(var i=0;i<R;i++){ var x=Math.pow(0.7,i); w.push(x); sum+=x; }

    // 1차는 수강보다 먼저 끝날 수 없다 — 안 들은 강의를 복습시키면 안 되므로
    var d0 = Math.max(Math.round(span*w[0]/sum), newDays, 1);
    d0 = Math.min(d0, span - (R-1));                            // 뒤 라운드에 최소 하루씩은 남긴다
    d0 = Math.max(d0, 1);

    var days=[d0], rest=span-d0, sumRest=0;
    for(var i=1;i<R;i++) sumRest+=w[i];
    for(var i=1;i<R;i++){
      var d = (i===R-1) ? rest : Math.max(1, Math.round((span-d0)*w[i]/sumRest));
      d = Math.min(d, rest-(R-1-i));
      d = Math.max(d, 1);
      days.push(d); rest-=d;
    }

    var rounds=[], cur=o.start;
    for(var i=0;i<R;i++){
      var to = fmtISO(addDays(parseISO(cur), days[i]-1));
      rounds.push({to:to});
      cur = fmtISO(addDays(parseISO(to), 1));
    }
    rounds[R-1].to = last;                                       // 마지막은 반드시 시험 전날
    return {newTo:newTo, rounds:rounds, span:span, newDays:newDays, left:left};
  }
  function isHard(n){ return !!state.hard[n]; }
  function lastRound(){
    var r=(state.rounds||[]).length;
    return r>=1 ? 'p'+Math.min(r,4) : '';
  }
  function phRemaining(k){
    var out=[];
    for(var n=1;n<=state.total;n++) if(!isDone(n,k)) out.push(n);
    if(k===lastRound()) out.sort(function(a,b){ return (isHard(b)?1:0)-(isHard(a)?1:0) || a-b; });
    return out;
  }
  /** 오늘 몫은 그날 한 번만 정한다 — 매번 다시 계산하면 지울 때마다 새 게 딸려 나온다 */
  function ensurePlan(){
    var t=todayISO();
    if(state.plan && state.plan.date===t) return;
    var p={date:t};
    PH().forEach(function(ph){
      var a=phFrom(ph.k), b=phTo(ph.k);
      if(!a || !b || t<a || t>b){ p[ph.k]=[]; return; }
      var rem=phRemaining(ph.k);
      if(!rem.length){ p[ph.k]=[]; return; }
      var left=diffDays(parseISO(t), parseISO(b))+1;
      var cnt=Math.max(1, Math.ceil(rem.length/left));
      p[ph.k]=rem.slice(0,cnt);
    });
    state.plan=p;
    save();
  }
  function phOpen(k){
    ensurePlan();
    return (state.plan[k]||[]).filter(function(n){ return !isDone(n,k); });
  }
  function phAssigned(k){ ensurePlan(); return state.plan[k]||[]; }
  function phProgress(n){ var c=0; PH().forEach(function(p){ if(isDone(n,p.k)) c++; }); return c; }
  function phLastColor(n){ var last=null; PH().forEach(function(p){ if(isDone(n,p.k)) last=p.color; }); return last; }

  var $ = function(id){ return document.getElementById(id); };

  function openDlg(id){
    var d=$(id);
    if(!d.open) d.showModal();
    if(N){ try{ N.setDialogOpen(true); }catch(e){} }
  }
  window.__closeTop = function(){
    var d=document.querySelector('dialog[open]');
    if(d) d.close();
  };
  Array.prototype.forEach.call(document.querySelectorAll('dialog'), function(d){
    d.addEventListener('close', function(){
      if(!document.querySelector('dialog[open]') && N){ try{ N.setDialogOpen(false); }catch(e){} }
    });
  });

  function pressable(el, onTap, onLong){
    var timer=null, fired=false;
    function start(){ fired=false; timer=setTimeout(function(){ fired=true; onLong(); }, 550); }
    function finish(){ if(timer){clearTimeout(timer); timer=null;} if(!fired) onTap(); }
    function cancel(){ if(timer){clearTimeout(timer); timer=null;} fired=true; }
    el.addEventListener('touchstart', start, {passive:true});
    el.addEventListener('touchmove', cancel, {passive:true});
    el.addEventListener('touchend', function(e){ e.preventDefault(); finish(); });
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', finish);
    el.addEventListener('mouseleave', cancel);
    el.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  }

  /* ── 오늘 할 일 모으기 ── */
  function collect(day){
    var open=[], done=[];
    STAGES_().forEach(function(s){
      overdue(day,s).forEach(function(o){
        open.push({type:'stage', s:s, b:o.b, late:day-o.day});
      });
    });
    redoDue(day).forEach(function(r){
      var b=parseInt(r.key.split(':')[0],10);
      var st=stageByKey(r.key.split(':')[1]);
      open.push({type:'redo', key:r.key, b:b, s:st, late:Math.max(0, day-r.due)});
    });
    STAGES_().forEach(function(s){
      var b=scheduled(day,s);
      if(b===null) return;
      if(blockDone(b,s.k)) done.push({s:s, b:b});
      else open.push({type:'stage', s:s, b:b, late:0});
    });
    return {open:open, done:done};
  }

  function renderDate(){
    if(isPhase()){
      var t=todayISO();
      $('dDate').textContent = human(parseISO(t));
      var dd0 = state.exam ? diffDays(parseISO(t), parseISO(state.exam)) : null;
      var from = (state.start && t<state.start) ? state.start : t;
      var days = state.exam ? diffDays(parseISO(from), parseISO(state.exam)) : null;
      $('dSub').textContent = days===null ? '' :
        (days>0 ? ('공부할 수 있는 날 '+days+'일'+(t<state.start?' · '+(parseISO(state.start).getMonth()+1)+'/'+parseISO(state.start).getDate()+' 시작':''))
                : (days===0?'시험 당일':'시험 지남'));
      $('dExam').innerHTML = dd0===null ? '' :
        ('<small>시험</small>'+(dd0>0?'D-'+dd0:(dd0===0?'D-DAY':'지남')));
      $('nav').style.display='none';
      return;
    }
    $('nav').style.display='';
    $('prevDay').disabled=false; $('nextDay').disabled=false; $('todayBtn').disabled=false;
    var d = addDays(parseISO(state.start), view-1);
    var rel = diffDays(parseISO(todayISO()), d);
    $('dDate').textContent = human(d);
    var tag = rel===0 ? '오늘' : (rel>0 ? rel+'일 뒤' : (-rel)+'일 전');
    $('dSub').textContent = view+'일차 · '+tag;

    var dd = examDDay();
    $('dExam').innerHTML = dd===null ? '' :
      ('<small>시험</small>'+(dd>0 ? 'D-'+dd : (dd===0 ? 'D-DAY' : '지남')));

    $('prevDay').disabled = view<=1;
    $('nextDay').disabled = view>=lastDay();
  }

  function renderShift(){
    var box=$('shift');
    if(isPhase()){
      var rows='';
      PH().forEach(function(ph){
        var a=phFrom(ph.k), b=phTo(ph.k);
        if(!a||!b) return;
        var doneN=state.total-phRemaining(ph.k).length;
        var pct=Math.round(doneN/state.total*100);
        var live = todayISO()>=a && todayISO()<=b;
        rows+='<div style="flex:1;min-width:0">'+
          '<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px">'+
            '<b style="color:'+ph.color+';font-weight:800">'+ph.name+(live?' ●':'')+'</b>'+
            '<i style="font-style:normal;font-family:var(--num);font-weight:500;color:var(--ink-3)">'+doneN+'/'+state.total+'</i>'+
          '</div>'+
          '<div style="height:4px;background:var(--hair);border-radius:2px;overflow:hidden">'+
            '<div style="height:100%;width:'+pct+'%;background:'+ph.color+'"></div></div>'+
          '<div style="font-family:var(--num);font-weight:500;font-size:9px;color:var(--ink-3);margin-top:3px">'+
            (parseISO(a).getMonth()+1)+'/'+parseISO(a).getDate()+'–'+(parseISO(b).getMonth()+1)+'/'+parseISO(b).getDate()+'</div></div>';
      });
      box.innerHTML = rows ? '<div style="display:flex;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:10px">'+rows+'</div>' : '';
      return;
    }
    var n=behindDays(view);
    if(n<=0){ box.innerHTML=''; return; }
    box.innerHTML = '<div class="shift"><p><b>'+n+'일 밀렸습니다.</b> 남은 일정을 '+n+'일 뒤로 밀면 오늘부터 다시 맞습니다.</p>'+
                    '<button class="btn" id="btnShift">'+n+'일 밀기</button></div>';
    $('btnShift').addEventListener('click', function(){
      if(!confirm('남은 일정을 '+n+'일 뒤로 밉니다.\n체크한 기록은 그대로 남습니다.\n계속할까요?')) return;
      state.start = fmtISO(addDays(parseISO(state.start), n));
      save(); view = clampToday(); render();
    });
  }

  function nextThing(){
    for(var d=view+1; d<=lastDay(); d++){
      var c = collect(d);
      if(c.open.length){
        var it = c.open[0];
        var name = it.type==='redo' ? '다시' : it.s.label;
        return (d-view)+'일 뒤 · '+labelOf(it.b)+'강 '+name;
      }
    }
    return null;
  }

  function renderTodayPhase(){
    var wrap=$('today'); wrap.innerHTML='';
    var t=todayISO(), any=false;

    PH().forEach(function(ph){
      var open=phOpen(ph.k);
      if(!open.length) return;
      any=true;
      var card=document.createElement('div');
      card.className='todo';
      card.style.setProperty('--c', ph.color);

      var chips=open.map(function(n){ return n; }).join(' ');
      var titles=open.map(function(n){
        var tt=titleOf(n);
        return tt?'<em>'+n+'</em>'+esc(tt):'';
      }).filter(Boolean).slice(0,6).join('<br>');

      var meat=document.createElement('div');
      meat.className='meat';
      meat.innerHTML='<div class="kind">'+ph.name+(ph.k==='new'?' (신규)':' 복습')+
        '<span style="font-family:var(--num);font-weight:500;font-size:10px;color:var(--ink-3);margin-left:6px">'+
        '남은 '+phRemaining(ph.k).length+'강</span></div>'+
        '<b class="n" style="font-size:20px">'+chips+'<i>강</i></b>'+

      });

  /** 회차 묶음을 "1–6" 또는 "55,59,1–2" 로 */
  function compress(list){
    if(!list || !list.length) return '';
    var runs=[], a=list[0], b=list[0];
    for(var i=1;i<list.length;i++){
      if(list[i]===b+1){ b=list[i]; }
      else { runs.push([a,b]); a=b=list[i]; }
    }
    runs.push([a,b]);
    return runs.map(function(r){ return r[0]===r[1]?String(r[0]):r[0]+'–'+r[1]; }).join(',');
  }

  /** 오늘 몫은 이미 정해진 것을 쓰고, 내일부터는 계획대로 간다고 가정해 굴려 본다 */
  function projectPhase(){
    var sim={};
    for(var k in state.done) sim[k]=state.done[k];
    var t=todayISO();
    var R=(state.rounds||[]).length;
    if(!R) return [];
    var lastTo=phTo('p'+R);
    if(!lastTo) return [];

    var out=[], day=t, guard=0;
    while(day<=lastTo && guard++<500){
      var row={date:day, cells:{}, today:(day===t)};
      PH().forEach(function(ph){
        var a=phFrom(ph.k), b=phTo(ph.k);
        if(!a||!b||day<a||day>b) return;
        var rem=[];
        for(var n=1;n<=state.total;n++) if(!sim[n+':'+ph.k]) rem.push(n);
        if(!rem.length) return;
        if(ph.k===lastRound()) rem.sort(function(x,y){ return (isHard(y)?1:0)-(isHard(x)?1:0) || x-y; });
        var take;
        if(day===t && state.plan && state.plan.date===t){
          take=(state.plan[ph.k]||[]).filter(function(n){ return !state.done[n+':'+ph.k]; });
        } else {
          var left=diffDays(parseISO(day), parseISO(b))+1;
          take=rem.slice(0, Math.max(1, Math.ceil(rem.length/left)));
        }
        take.forEach(function(n){ sim[n+':'+ph.k]=true; });
        if(take.length) row.cells[ph.k]=take;   // 정렬하지 않는다 — 마지막 회차의 막힘 우선이 보여야 한다
      });
      if(Object.keys(row.cells).length) out.push(row);
      day=fmtISO(addDays(parseISO(day),1));
    }
    return out;
  }

      STAGES_().map(function(s){ return '<th style="color:'+s.color+'">'+s.label+'</th>'; }).join('')+'</tr></thead>';

    idleGaps(state.total, state.per, (state.offs&&state.offs.length===3)?state.offs:DEFAULT_OFFS)
      .forEach(function(x){ for(var i=x.fromDay;i<=x.toDay;i++) gapDays[i]=true; });
    var start=parseISO(state.start), rows='', e=examDayIndex();

      }).join('');

    var has=(state.rounds||[]).length;
    $('planNow').innerHTML = ph
      ? (has ? '지금: <b>단계형</b> · '+state.total+'강 · 복습 '+has+'회 · 시험 '+(state.exam?md(state.exam):'—')
             : '아직 계획이 없습니다. 위 버튼을 눌러 세우세요.')
      : '지금: <b>간격형</b> · '+state.total+'강 · 하루 '+state.per+'강 · 간격 '+
        ((state.offs&&state.offs.length===3)?state.offs.join(' · '):'1 · 7 · 30');
  }
  /* ── 계획 세우기 ── */
  var wR=3, wMode='phase';
  function paintWMode(){
    $('wmPhase').className='tog'+(wMode==='phase'?' on':'');
    $('wmInterval').className='tog'+(wMode==='interval'?' on':'');
    $('wmPhase').querySelector('.tk').style.background = wMode==='phase'?'var(--d30)':'var(--line)';
    $('wmInterval').querySelector('.tk').style.background = wMode==='interval'?'var(--d1)':'var(--line)';
    $('wmPhase').style.color = wMode==='phase'?'var(--d30)':'var(--ink-2)';
    $('wmInterval').style.color = wMode==='interval'?'var(--d1)':'var(--ink-2)';
    $('wRoundsRow').style.display = wMode==='phase'?'':'none';
    $('wOffsRow').style.display   = wMode==='interval'?'':'none';
    $('wHeardRow').style.display  = wMode==='interval'?'none':'';   // 간격형에선 뜻이 없다
    $('wmNote').textContent = wMode==='phase'
      ? '모든 강의를 같은 기간 안에 한 번씩 돌립니다. 시험이 정해져 있을 때.'
      : '각 강의를 들은 날로부터 세는 방식. 기간이 넉넉할 때.';
  }
  function paintRounds(){
    var box=$('wRounds'); box.innerHTML='';
    [2,3,4].forEach(function(r){
      var b=document.createElement('button');
      b.className='rbtn'+(wR===r?' on':'');
      if(wR===r) b.style.color=ROUND_COLORS[r-1];
      b.textContent=r+'회';
      b.addEventListener('click', function(){ wR=r; paintRounds(); preview(); });
      box.appendChild(b);
    });
  }
  function md(x){ var d=parseISO(x); return (d.getMonth()+1)+'/'+d.getDate(); }
  /** 간격형: 마지막 강의의 마지막 복습이 시험 전에 끝나는가 */
  function previewInterval(){
    var total=Math.max(1, parseInt($('wTotal').value,10)||60);
    var per=Math.max(1, parseInt($('wPerNew').value,10)||2);
    var start=$('wStart').value, exam=$('wExam').value;
    var offs=[1,2,3].map(function(i){ return Math.max(1, parseInt($('wOff'+i).value,10)||DEFAULT_OFFS[i-1]); });
    var box=$('wPrev');
    if(!start){ box.innerHTML='<p class="okline">시작일을 넣으면 계획이 나옵니다</p>'; return null; }

    var blocks=Math.ceil(total/per);
    var lastDay=blocks+Math.max.apply(null,offs);          // 마지막 덩어리의 마지막 복습
    var endISO=fmtISO(addDays(parseISO(start), lastDay-1));
    var html='<div class="prev">';
    html+='<div class="prow"><span class="pd" style="background:var(--new)"></span>'+
      '<span class="pn" style="color:var(--new)">수강</span>'+
      '<span class="pw">'+md(start)+'–'+md(fmtISO(addDays(parseISO(start), blocks-1)))+' · '+blocks+'일</span>'+
      '<span class="pl">하루 '+per+'강</span></div>';
    offs.forEach(function(o,i){
      var a=fmtISO(addDays(parseISO(start), o));
      var b=fmtISO(addDays(parseISO(start), blocks-1+o));
      html+='<div class="prow"><span class="pd" style="background:'+STAGE_COLS[i]+'"></span>'+
        '<span class="pn" style="color:'+STAGE_COLS[i]+'">'+offLabel(o)+'</span>'+
        '<span class="pw">'+md(a)+'–'+md(b)+'</span>'+
        '<span class="pl">하루 '+per+'강</span></div>';
    });
    var peak=per*(1+offs.length);
    var msg='하루 최대 <b>'+peak+'개</b> · 전부 끝나는 날 <b>'+md(endISO)+'</b> ('+lastDay+'일차)';

    idleGaps(total, per, offs).forEach(function(x){
      var a=fmtISO(addDays(parseISO(start), x.fromDay-1));
      var b2=fmtISO(addDays(parseISO(start), x.toDay-1));
      msg+='<br><span class="pbad"><b>'+md(a)+'~'+md(b2)+' '+x.days+'일은 할 게 없습니다.</b> '+
        x.fromName+' 복습이 끝났는데 '+x.toName+' 복습이 아직 안 옵니다. '+
        '간격을 <b>'+x.fix+'</b>로 줄이면 이어지고, 그냥 두면 그 '+x.days+'일은 기출 같은 다른 공부에 쓰시면 됩니다.</span>';
    });
    if(exam){
      var need=diffDays(parseISO(start), parseISO(exam));
      if(lastDay-1 > need){
        var over=(lastDay-1)-need;
        msg+='<br><span class="pbad">시험('+md(exam)+')보다 '+over+'일 늦게 끝납니다. '+
          '간격을 줄이거나 단계형을 쓰세요.</span>';
      } else {
        msg+='<br>시험('+md(exam)+') 전에 끝납니다';
      }
    }
    // 이미 체크된 수강 기록이 있으면, 간격형이 그걸 어떻게 망가뜨리는지 그대로 보여준다
    var heardNow=0;
    while(heardNow<total && isDone(heardNow+1,'new')) heardNow++;
    if(heardNow>0 && heardNow<total){
      var firstB=Math.floor(heardNow/per)+1;
      var when=fmtISO(addDays(parseISO(start), firstB-1));
      msg+='<br><span class="pbad">이미 들은 '+heardNow+'강이 있습니다. 간격형은 「b번째 덩어리는 b일차」라서, '+
        '아직 안 들은 <b>'+(heardNow+1)+'강이 '+md(when)+'에나</b> 잡힙니다'+
        (exam && when>exam ? ' — 시험 뒤입니다' : '')+'. 단계형을 쓰세요.</span>';
    }
    html+='<p class="psum">'+msg+'</p></div>';
    box.innerHTML=html;
    return {mode:'interval', total:total, per:per, start:start, exam:exam, offs:offs};
  }

  function preview(){
    if(wMode==='interval') return previewInterval();
    var o={
      total: Math.max(1, parseInt($('wTotal').value,10)||60),
      heard: Math.max(0, parseInt($('wHeard').value,10)||0),
      perNew: Math.max(1, parseInt($('wPerNew').value,10)||2),
      start: $('wStart').value, exam: $('wExam').value, rounds: wR
    };
    var box=$('wPrev');
    if(!o.start || !o.exam || o.exam<=o.start){
      box.innerHTML='<p class="okline">시작일과 시험일을 넣으면 계획이 나옵니다</p>';
      return null;
    }
    var p=makePlan(o);
    if(!p){ box.innerHTML='<p class="okline pbad">시험일이 시작일보다 뒤여야 합니다</p>'; return null; }

    var html='<div class="prev">';
    var peak=0, first=0;
    if(p.left>0){
      html+='<div class="prow"><span class="pd" style="background:var(--new)"></span>'+
        '<span class="pn" style="color:var(--new)">수강</span>'+
        '<span class="pw">'+md(o.start)+'–'+md(p.newTo)+' · '+p.newDays+'일</span>'+
        '<span class="pl">하루 '+o.perNew+'강</span></div>';
      first+=o.perNew;
    }
    p.rounds.forEach(function(r,i){
      var from = i===0 ? o.start : fmtISO(addDays(parseISO(p.rounds[i-1].to),1));
      var d = diffDays(parseISO(from), parseISO(r.to))+1;
      var per = Math.ceil(o.total/d);
      if(i===0) first+=per;
      peak=Math.max(peak, per + (i===0?o.perNew:0));
      html+='<div class="prow"><span class="pd" style="background:'+ROUND_COLORS[i]+'"></span>'+
        '<span class="pn" style="color:'+ROUND_COLORS[i]+'">'+(i+1)+'차</span>'+
        '<span class="pw">'+md(from)+'–'+md(r.to)+' · '+d+'일</span>'+
        '<span class="pl">하루 '+per+'강</span></div>';
    });
    var lastPer = Math.ceil(o.total / (diffDays(parseISO(fmtISO(addDays(parseISO(p.rounds[p.rounds.length-2]?p.rounds[p.rounds.length-2].to:o.start),1))), parseISO(p.rounds[p.rounds.length-1].to))+1));
    html+='<p class="psum">첫 주 하루 <b>'+first+'개</b> · 마지막 단계 하루 <b>'+lastPer+'개</b>'+
      (lastPer>=15 ? '<br><span class="pbad">마지막 단계는 훑기 수준입니다. 복습 횟수를 줄이거나 시작을 앞당기세요.</span>' : '')+
      (p.left>0 && p.newDays>=p.span*0.6 ? '<br><span class="pbad">수강에 기간 대부분을 씁니다. 하루 신규 강의를 늘리세요.</span>' : '')+
      '</p></div>';
    box.innerHTML=html;
    return {o:o, p:p};
  }
  $('wmPhase').addEventListener('click', function(){ wMode='phase'; paintWMode(); preview(); });
  $('wmInterval').addEventListener('click', function(){ wMode='interval'; paintWMode(); preview(); });
  ['wTotal','wHeard','wStart','wExam','wPerNew','wOff1','wOff2','wOff3'].forEach(function(id){
    $(id).addEventListener('input', preview);
    $(id).addEventListener('change', preview);
  });
  $('btnPlan').addEventListener('click', function(){
    var heard=0;
    while(heard<state.total && isDone(heard+1,'new')) heard++;   // 1강부터 이어진 데까지
    $('wTotal').value=state.total;
    $('wHeard').value=heard;
    $('wStart').value=state.start && state.start>=todayISO() ? state.start : todayISO();
    $('wExam').value=state.exam||'';
    $('wPerNew').value=state.perNew||2;
    var of=(state.offs&&state.offs.length===3)?state.offs:DEFAULT_OFFS;
    $('wOff1').value=of[0]; $('wOff2').value=of[1]; $('wOff3').value=of[2];
    wR=(state.rounds||[]).length||3;
    wMode=state.mode||'phase';
    paintWMode(); paintRounds(); preview();
    openDlg('planDlg');
  });
  $('planCancel').addEventListener('click', function(){ $('planDlg').close(); });
  $('planGo').addEventListener('click', function(){
    var r=preview();
    if(!r){ return; }
    if(r.mode==='interval'){
      state.mode='interval';
      state.total=r.total; state.per=r.per; state.start=r.start;
      state.exam=r.exam||''; state.offs=r.offs;
      state.plan=null; view=1;
      save();
      if(N){ try{ N.syncAlarm(); }catch(e){} }
      $('planDlg').close();
      if($('setDlg').open) $('setDlg').close();
      render();
      return;
    }
    state.mode='phase';
    state.total=r.o.total;
    state.start=r.o.start;
    state.exam=r.o.exam;
    state.perNew=r.o.perNew;
    state.newTo=r.p.newTo;
    state.rounds=r.p.rounds;
    // 「이미 들은 강의 = N」 은 선언이다 → 1~N 은 켜고 N+1 부터는 끈다.
    // 켜기만 하면 숫자를 줄여도 안 지워진다.
    for(var n=1;n<=state.total;n++){
      if(n<=r.o.heard) state.done[n+':new']=true;
      else delete state.done[n+':new'];
    }
    state.plan=null;
    save();
    if(N){ try{ N.syncAlarm(); }catch(e){} }
    $('planDlg').close();
    if($('setDlg').open) $('setDlg').close();
    render();
  });



  $('btnSetup').addEventListener('click', function(){
    paintMode();
    $('fStart').value=state.start; $('fTotal').value=state.total; $('fPer').value=state.per;
    $('fExam').value=state.exam||'';
    $('fNotifyOn').checked=!!state.notifyOn;
    $('fTime').value=pad(state.notifyHour)+':'+pad(state.notifyMin);
    renderNotifyHelp();
    openDlg('setDlg');
  });
  $('setCancel').addEventListener('click', function(){ $('setDlg').close(); });
  $('setSave').addEventListener('click', function(){
    state.start=$('fStart').value||todayISO();
    state.total=Math.max(1, Math.min(500, parseInt($('fTotal').value,10)||60));
    state.per  =Math.max(1, Math.min(20,  parseInt($('fPer').value,10)||3));
    state.exam =$('fExam').value||'';
    state.notifyOn=$('fNotifyOn').checked;
    var t=($('fTime').value||'21:00').split(':');
    state.notifyHour=parseInt(t[0],10)||0;
    state.notifyMin =parseInt(t[1],10)||0;
    save();
    if(N){ try{ N.syncAlarm(); }catch(e){} }
    $('setDlg').close(); view=clampToday(); render();
  });

  /* ── 제목 ── */
  $('btnTitles').addEventListener('click', function(){
    var lines=[];
    for(var n=1;n<=state.total;n++) lines.push(titleOf(n));
    while(lines.length && !lines[lines.length-1]) lines.pop();
    $('fTitles').value=lines.join('\n');
    openDlg('titleDlg');
  });
  $('titleCancel').addEventListener('click', function(){ $('titleDlg').close(); });
  $('titleSave').addEventListener('click', function(){
    var lines=$('fTitles').value.split('\n');
    state.titles={};
    for(var i=0;i<lines.length && i<state.total;i++){
      var v=lines[i].trim();
      if(v) state.titles[String(i+1)]=v;
    }
    save(); $('titleDlg').close(); render();
  });

  /* ── 백업 ── */
  $('btnData').addEventListener('click', function(){ openDlg('dataDlg'); });
  $('dataClose').addEventListener('click', function(){ $('dataDlg').close(); });
  $('doExport').addEventListener('click', function(){
    var s=JSON.stringify(state,null,2);
    if(N){ try{ N.exportState(s); }catch(e){} $('dataDlg').close(); return; }
    var a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([s],{type:'application/json'}));
    a.download='복습도장판_'+todayISO()+'.json';
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); },1000);
  });
  $('doImport').addEventListener('click', function(){
    if(N){ try{ N.importState(); }catch(e){} $('dataDlg').close(); return; }
    $('fileIn').click();
  });
  $('fileIn').addEventListener('change', function(e){
    var f=e.target.files[0];
    if(!f) return;
    var r=new FileReader();
    r.onload=function(){
      try{
        var o=JSON.parse(r.result);
        if(!o.start||!o.total) throw 0;
        state=Object.assign(defaults(), o);
        state.done=o.done||{}; state.titles=o.titles||{}; state.redo=o.redo||{};
        save(); view=clampToday(); render(); $('dataDlg').close();
      }catch(err){ alert('이 파일은 복습 도장판 저장 파일이 아닙니다.'); }
    };
    r.readAsText(f);
    e.target.value='';
  });
  $('doReset').addEventListener('click', function(){
    if(!confirm('체크한 기록과 설정을 모두 지웁니다. 되돌릴 수 없습니다. 계속할까요?')) return;
    state=defaults(); view=1;
    if(N){ try{ N.resetAll(); }catch(e){} }
    else { try{ localStorage.removeItem(KEY); }catch(e){} }
    save(); render(); $('dataDlg').close();
  });

  load();
  view=clampToday();
  render();
})();
</script>
</body>
</html>
